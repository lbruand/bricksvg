name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y graphviz

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check ldr2svg/ test/

      - name: Type-check (ty)
        run: uv run ty check ldr2svg/

      - name: Run tests (fast, no OpenSCAD required)
        run: uv run pytest test/ -m "not slow" -v
